name: Deploy CloudBase

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli@latest

      - name: Login CloudBase
        run: tcb login --apiKeyId "${{ secrets.TCB_SECRET_ID }}" --apiKey "${{ secrets.TCB_SECRET_KEY }}"

      - name: Deploy CloudRun service
        run: >
          tcb cloudrun deploy
          -e "${{ secrets.TCB_ENV_ID }}"
          -s "${{ secrets.TCB_SERVICE_NAME }}"
          --source .
          --port 80
          --force
