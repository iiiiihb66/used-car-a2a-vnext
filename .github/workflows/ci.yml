name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke test app
        run: |
          python - <<'PY'
          import uuid
          from fastapi.testclient import TestClient
          from app import app

          with TestClient(app) as client:
              health = client.get("/health")
              root = client.get("/")
              assert health.status_code == 200, health.text
              assert health.json()["status"] == "healthy"
              assert root.status_code == 200, root.text
              assert root.json()["mode"] == "tool"

              token = uuid.uuid4().hex[:8]
              buyer = client.post("/api/v1/users", json={
                  "name": f"buyer-{token}",
                  "email": f"buyer-{token}@example.com",
                  "is_dealer": False
              })
              seller = client.post("/api/v1/users", json={
                  "name": f"seller-{token}",
                  "email": f"seller-{token}@example.com",
                  "is_dealer": True
              })
              assert buyer.status_code == 200, buyer.text
              assert seller.status_code == 200, seller.text
              buyer_id = buyer.json()["data"]["id"]
              seller_id = seller.json()["data"]["id"]

              car = client.post(f"/api/v1/cars?user_id={seller_id}", json={
                  "brand": "丰田",
                  "model": "卡罗拉",
                  "year": 2021,
                  "price": 98000,
                  "mileage": 32000,
                  "region": "北京",
                  "city": "北京"
              })
              assert car.status_code == 200, car.text

              demand = client.post("/api/v1/demands", json={
                  "user_id": buyer_id,
                  "car_type": "紧凑型轿车",
                  "brand_preference": "丰田",
                  "budget_min": 90000,
                  "budget_max": 100000,
                  "region": "北京",
                  "city": "北京",
                  "year_min": 2020,
                  "mileage_max": 50000
              })
              assert demand.status_code == 200, demand.text
              demand_id = demand.json()["data"]["demand_id"]

              matches = client.get(f"/api/v1/demands/{demand_id}/matches")
              assert matches.status_code == 200, matches.text
              assert matches.json()["success"] is True
              assert matches.json()["total"] >= 1
          PY
